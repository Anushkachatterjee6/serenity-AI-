<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Serenity AI</title>
    <meta name="description" content="Your safe space to talk - Emotion-Aware AI Companion" />
    <script>
      const params = new URLSearchParams(window.location.search);
      window.VITE_SUPABASE_URL = params.get('sb_url') || "%%SUPABASE_URL%%";
      window.VITE_SUPABASE_PUBLISHABLE_KEY = params.get('sb_key') || "%%SUPABASE_KEY%%";
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Required for Streamlit Custom Components to clear the "loading" timeout
      function sendReady() {
        window.parent.postMessage({
          isStreamlitMessage: true,
          type: "streamlit:componentReady",
          apiVersion: 1
        }, "*");
      }

      // Send ready message after a small delay to ensure React has started
      setTimeout(sendReady, 100);

      // Auto-resize handler
      window.addEventListener("load", () => {
        window.parent.postMessage({
          isStreamlitMessage: true,
          type: "streamlit:setComponentValue",
          value: null
        }, "*");
      });
    </script>
  </body>
</html>
