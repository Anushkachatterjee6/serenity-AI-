<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Serenity AI</title>
    <meta name="description" content="Your safe space to talk - Emotion-Aware AI Companion" />
    <script>
      const params = new URLSearchParams(window.location.search);
      window.VITE_SUPABASE_URL = params.get('sb_url') || "%%SUPABASE_URL%%";
      window.VITE_SUPABASE_PUBLISHABLE_KEY = params.get('sb_key') || "%%SUPABASE_KEY%%";
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // 1. Initial lookup from URL (fallback)
      const params = new URLSearchParams(window.location.search);
      window.VITE_SUPABASE_URL = params.get('sb_url') || "%%SUPABASE_URL%%";
      window.VITE_SUPABASE_PUBLISHABLE_KEY = params.get('sb_key') || "%%SUPABASE_KEY%%";

      // 2. Official Streamlit Message Bridge
      window.addEventListener("message", (event) => {
        if (event.data && event.data.type === "streamlit:render") {
          const args = event.data.args;
          if (args.sb_url) window.VITE_SUPABASE_URL = args.sb_url;
          if (args.sb_key) window.VITE_SUPABASE_PUBLISHABLE_KEY = args.sb_key;
        }
      });

      // 3. Signal Ready
      function sendReady() {
        window.parent.postMessage({
          isStreamlitMessage: true,
          type: "streamlit:componentReady",
          apiVersion: 1
        }, "*");
      }
      setTimeout(sendReady, 100);
    </script>
  </body>
</html>
